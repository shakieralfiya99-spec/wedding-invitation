<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aabith & Maqbul Wedding Invitation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Cover -->
<section id="cover">

    <div id="glow"></div>
    <div id="doors">

        <img src="left-door.png" id="leftDoor">

        <img src="right-door.png" id="rightDoor">

    </div>

</section>

<!-- Invitation -->
<div id="website">

<section class="page">
    <img src="intro.png">
</section>

<section class="page">
    <img src="details.png">
</section>

<section class="page countdown-page">

    <div class="countdown-container">
        <img src="countdown.png">

        <div id="countdown">
            <div>
                <span id="days">00</span>
                <small>Days</small>
            </div>

            <div>
                <span id="hours">00</span>
                <small>Hours</small>
            </div>

            <div>
                <span id="minutes">00</span>
                <small>Minutes</small>
            </div>

            <div>
                <span id="seconds">00</span>
                <small>Seconds</small>
            </div>
        </div>

    </div>

</section>

<section class="page venue-page">

    <img src="venue.png" alt="Venue">

    <iframe
        class="venue-map"
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3892.3715725149227!2d79.27562177449852!3d12.689153721008983!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bad2f9050d01905%3A0x508f2aab165f4385!2sARUNA%20MARRIAGE%20HALL%2C%20ARNI!5e0!3m2!1sen!2sin!4v1783969546094!5m2!1sen!2sin"
        loading="lazy"
        allowfullscreen>
    </iframe>

</section>

<section class="page">
    <img src="thankyou.png">
</section>

</div>

<div id="petals"></div>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
